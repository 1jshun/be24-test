apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-statefulset
spec:
  replicas: 1
  serviceName: mariadb-service
  selector:
    matchLabels:
      type: db
  template:
    metadata:
      labels:
        type: db
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: qwer1234
            - name: MARIADB_DATABASE
              value: web
          volumeMounts:
            - name: volume
              mountPath: /var/lib/mysql
      terminationGracePeriodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: volume
      spec:
        accessModes:
          - ReadWriteMany
        resources:
          requests:
            storage: 1G
        storageClassName: "longhorn"